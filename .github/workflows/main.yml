name: Build Pure Cheat Engine

on: 
  workflow_dispatch: # 支持手动触发编译

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 安装 Lazarus 环境 (核心构建工具)
      - name: Install Lazarus
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: '2.2.2' # 匹配 README 要求的版本

      # 2. 编译 Cheat Engine 核心 (64位)
      - name: Build CE Core (x86_64)
        run: |
          lazbuild "Cheat Engine/cheatengine.lpi" --build-mode=Release

      # 3. 配置 MSBuild (用于编译 C++ 扩展插件)
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 4. 编译关键插件 (增加路径检查和自动寻址)
      - name: Build Extensions (C++)
        run: |
          # 自动寻找 sln 文件，防止路径层级错误
          $speedhackSln = Get-ChildItem -Recurse -Filter "speedhack.sln" | Select-Object -First 1
          $dxMessSln = Get-ChildItem -Recurse -Filter "DirectXMess.sln" | Select-Object -First 1
          
          if ($speedhackSln) {
            echo "Found Speedhack at $($speedhackSln.FullName)"
            msbuild "$($speedhackSln.FullName)" /p:Configuration=Release /p:Platform=x64
          } else {
            echo "Error: speedhack.sln not found!"
            exit 1
          }

          if ($dxMessSln) {
            echo "Found DirectXMess at $($dxMessSln.FullName)"
            msbuild "$($dxMessSln.FullName)" /p:Configuration=Release /p:Platform=x64
          } else {
            echo "Error: DirectXMess.sln not found!"
            exit 1
          }

      # 5. 整理并打包产物
      - name: Organize Artifacts
        run: |
          mkdir build_output
          copy "Cheat Engine/bin/Cheat Engine.exe" build_output/
          # 如果有生成的 dll，也一并复制
          if (Test-Path "Cheat Engine/bin/*.dll") { copy "Cheat Engine/bin/*.dll" build_output/ }

      # 6. 上传构建结果
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pure-Cheat-Engine-Build
          path: build_output/
