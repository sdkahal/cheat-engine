name: Build Pure Cheat Engine

on: 
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 确保插件源码下载完整

      # --- 方案 B: 缓存 Lazarus 环境 ---
      - name: Cache Lazarus
        id: cache-lazarus
        uses: actions/cache@v4
        with:
          path: |
            C:\lazarus
            C:\fpc
          key: ${{ runner.os }}-lazarus-2.2.2
          restore-keys: |
            ${{ runner.os }}-lazarus-

      - name: Install Lazarus
        if: steps.cache-lazarus.outputs.cache-hit != 'true'
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: '2.2.2'

      # 提前创建日志目录
      - name: Prepare Log Directory
        run: mkdir -p build_output/logs

      # 1. 编译核心及 Pascal 插件 (带日志捕获)
      - name: Build Pascal Projects (Core, Speedhack, VEH)
        shell: powershell
        run: |
          # 编译主程序
          $coreLpi = Get-ChildItem -Recurse -Filter "cheatengine.lpi" | Select-Object -First 1
          if ($coreLpi) {
            Write-Host "Compiling Core..."
            & lazbuild "$($coreLpi.FullName)" --cpu=x86_64 --os=win64 > "build_output/logs/cheatengine.lpi.log" 2>&1
          }

          # 编译 Speedhack
          $speedhackLpr = Get-ChildItem -Recurse -Filter "speedhack.lpr" | Select-Object -First 1
          if ($speedhackLpr) {
            Write-Host "Compiling Speedhack..."
            & lazbuild "$($speedhackLpr.FullName)" --cpu=x86_64 --os=win64 > "build_output/logs/speedhack.lpr.log" 2>&1
          }

          # 编译 VEH Debugger
          $vehLpr = Get-ChildItem -Recurse -Filter "vehdebug.lpr" | Select-Object -First 1
          if ($vehLpr) {
            Write-Host "Compiling VEH Debugger..."
            & lazbuild "$($vehLpr.FullName)" --cpu=x86_64 --os=win64 > "build_output/logs/vehdebug.lpr.log" 2>&1
          }

      # 2. 配置 MSBuild 环境
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 3. 编译 C++ 扩展 (带日志捕获)
      - name: Build C++ Extensions
        shell: powershell
        run: |
          # MSBuild 参数：/fl 指定生成日志文件，/flp 过滤只显示错误和警告
          $msArgs = "/p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0"
          
          # 编译 DirectX 遮罩
          $dxSln = Get-ChildItem -Recurse -Filter "DirectXMess.sln" | Select-Object -First 1
          if ($dxSln) {
            Write-Host "Compiling DirectXMess..."
            msbuild "$($dxSln.FullName)" $msArgs.Split(' ') /fl "/flp:logfile=build_output/logs/DirectXMess.errors.log;errorsonly"
          }

          # 编译 Mono 数据收集器
          $monoStoreSln = Get-ChildItem -Recurse -Filter "monodatacollector.sln" | Select-Object -First 1
          if ($monoStoreSln) {
            Write-Host "Compiling MonoDataCollector..."
            msbuild "$($monoStoreSln.FullName)" $msArgs.Split(' ') /fl "/flp:logfile=build_output/logs/MonoDataCollector.errors.log;errorsonly"
          }

      # 4. 整理产物：直接打包整个 bin 目录 (if: always 确保报错时也能拿到产物和 log)
      - name: Organize Artifacts
        if: always()
        shell: powershell
        run: |
          # 1. 创建输出根目录
          if (!(Test-Path "build_output")) { mkdir build_output }

          # 2. 定位编译生成的 bin 目录 (通常在 Cheat Engine/bin)
          $binDir = Get-ChildItem -Recurse -Directory -Filter "bin" | Where-Object { Test-Path "$($_.FullName)\cheatengine-x86_64.exe" } | Select-Object -First 1

          if ($binDir) {
            Write-Host "Found compiled bin directory at: $($binDir.FullName)"
            # 将整个 bin 目录内容复制到 build_output
            Copy-Item -Path "$($binDir.FullName)\*" -Destination "build_output" -Recurse -Force
            
            # 顺便改个名，让主程序看起来更清爽 (可选)
            if (Test-Path "build_output\cheatengine-x86_64.exe") {
              Rename-Item -Path "build_output\cheatengine-x86_64.exe" -NewName "Cheat Engine.exe"
            }
          } else {
            Write-Host "Warning: Compiled bin directory not found. Trying to fallback to manual collection." -ForegroundColor Yellow
          }

          # 3. 确保日志目录也被包含在内
          # 这一步是为了让你在 build_output 里直接看到 logs 文件夹
          # 注意：上面的 Prepare Log Directory 步骤建议改到 build_output 之外，或者最后移动
          Write-Host "Final Folder Structure:"
          ls -Recurse build_output/

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Pure-Cheat-Engine-Build-Result
          path: build_output/
