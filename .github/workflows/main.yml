name: Build Pure Cheat Engine

on: 
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 确保插件源码下载完整

      # --- 方案 B: 缓存 Lazarus 环境 ---
      - name: Cache Lazarus
        id: cache-lazarus
        uses: actions/cache@v4
        with:
          path: |
            C:\lazarus
            C:\fpc
          key: ${{ runner.os }}-lazarus-2.2.2
          restore-keys: |
            ${{ runner.os }}-lazarus-

      - name: Install Lazarus
        if: steps.cache-lazarus.outputs.cache-hit != 'true'
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: '2.2.2'

      # 1. 编译核心及 Pascal 插件 (移除 Build Mode 限制)
      - name: Build Pascal Projects (Core, Speedhack, VEH)
        run: |
          # 编译主程序 (强制 64 位)
          $coreLpi = Get-ChildItem -Recurse -Filter "cheatengine.lpi" | Select-Object -First 1
          if ($coreLpi) {
            lazbuild "$($coreLpi.FullName)" --cpu=x86_64 --os=win64
          }

          # 编译 Speedhack (去掉 --build-mode 参数，让它用默认配置)
          $speedhackLpr = Get-ChildItem -Recurse -Filter "speedhack.lpr" | Select-Object -First 1
          if ($speedhackLpr) {
            lazbuild "$($speedhackLpr.FullName)" --cpu=x86_64 --os=win64
          }

          # 编译 VEH Debugger
          $vehLpr = Get-ChildItem -Recurse -Filter "vehdebug.lpr" | Select-Object -First 1
          if ($vehLpr) {
            lazbuild "$($vehLpr.FullName)" --cpu=x86_64 --os=win64
          }

      # 2. 配置 MSBuild 环境
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

     # 3. 编译 C++ 扩展 (保持之前的 SDK 修复)
      - name: Build C++ Extensions
        run: |
          $msArgs = "/p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0"
          
          # 编译 DirectX 遮罩
          $dxSln = Get-ChildItem -Recurse -Filter "DirectXMess.sln" | Select-Object -First 1
          if ($dxSln) {
            msbuild "$($dxSln.FullName)" $msArgs.Split(' ')
          }

          # 编译 Mono 数据收集器
          $monoStoreSln = Get-ChildItem -Recurse -Filter "monodatacollector.sln" | Select-Object -First 1
          if ($monoStoreSln) {
            msbuild "$($monoStoreSln.FullName)" $msArgs.Split(' ')
          }

      # 4. 整理并打包产物 (模糊匹配 + 重命名)
      - name: Organize Artifacts
        run: |
          mkdir build_output
          
          # 抓取所有包含 cheatengine 字样的 EXE 并重命名为简洁版
          Get-ChildItem -Path "." -Filter "cheatengine*.exe" -Recurse | Where-Object { $_.FullName -notmatch "obj|lib|backup" } | ForEach-Object {
            copy $_.FullName "build_output/Cheat Engine.exe"
          }

          # 抓取所有 DLL
          Get-ChildItem -Path "." -Filter "*.dll" -Recurse | Where-Object { $_.FullName -notmatch "obj|lib|backup" } | ForEach-Object {
            copy $_.FullName build_output/
          }

          # 列表确认
          ls build_output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pure-Cheat-Engine-Build
          path: build_output/
