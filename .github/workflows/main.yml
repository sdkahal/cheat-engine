name: Build Pure Cheat Engine

on: 
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 确保插件源码下载完整

      # --- 方案 B: 缓存 Lazarus 环境 ---
      - name: Cache Lazarus
        id: cache-lazarus
        uses: actions/cache@v4
        with:
          path: |
            C:\lazarus
            C:\fpc
          key: ${{ runner.os }}-lazarus-2.2.2
          restore-keys: |
            ${{ runner.os }}-lazarus-

      - name: Install Lazarus
        if: steps.cache-lazarus.outputs.cache-hit != 'true'
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: '2.2.2'

      # 1. 编译核心及 Pascal 插件 (Lazarus/lazbuild)
      - name: Build Pascal Projects (Core, Speedhack, VEH)
        run: |
          # 编译主程序
          $coreLpi = Get-ChildItem -Recurse -Filter "cheatengine.lpi" | Select-Object -First 1
          if ($coreLpi) {
            lazbuild "$($coreLpi.FullName)" --build-mode=Release
          }

          # 编译 Speedhack (README 明确指出它是 .lpr)
          $speedhackLpr = Get-ChildItem -Recurse -Filter "speedhack.lpr" | Select-Object -First 1
          if ($speedhackLpr) {
            echo "Building Speedhack from $($speedhackLpr.FullName)"
            lazbuild "$($speedhackLpr.FullName)" --build-mode=Release
          }

          # 编译 VEH Debugger
          $vehLpr = Get-ChildItem -Recurse -Filter "vehdebug.lpr" | Select-Object -First 1
          if ($vehLpr) {
            lazbuild "$($vehLpr.FullName)" --build-mode=Release
          }

      # 2. 配置 MSBuild 环境
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

     # 3. 编译 C++ 扩展 (MSBuild/sln)
      - name: Build C++ Extensions
        run: |
          # 定义通用参数，避免冗长
          # v143 是 VS2022 工具集，10.0 会自动选择最新的 Win10/11 SDK
          $msArgs = "/p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0"

          # 1. 编译 D3D Overlay 支持
          $dxSln = Get-ChildItem -Recurse -Filter "DirectXMess.sln" | Select-Object -First 1
          if ($dxSln) {
            echo "Building DirectXMess: $($dxSln.FullName)"
            msbuild "$($dxSln.FullName)" $msArgs.Split(' ')
          }

          # 2. 编译 Mono 数据收集器 (报错的那个项目)
          $monoStoreSln = Get-ChildItem -Recurse -Filter "monodatacollector.sln" | Select-Object -First 1
          if ($monoStoreSln) {
            echo "Building MonoDataCollector: $($monoStoreSln.FullName)"
            msbuild "$($monoStoreSln.FullName)" $msArgs.Split(' ')
          }

      # 4. 整理并打包产物
      - name: Organize Artifacts
        run: |
          mkdir build_output
          
          # A. 专门寻找主程序 (这是你最需要的)
          Write-Host "Searching for Cheat Engine.exe..."
          $ceExe = Get-ChildItem -Path "." -Filter "Cheat Engine*.exe" -Recurse | Where-Object { $_.FullName -notmatch "obj|lib|backup|framework" } | Select-Object -First 1
          
          if ($ceExe) {
            Write-Host "Found EXE at: $($ceExe.FullName)"
            copy "$($ceExe.FullName)" build_output/
          } else {
            Write-Error "Could not find Cheat Engine.exe! Check Pascal build logs."
            exit 1
          }

          # B. 寻找所有的 DLL 插件 (Speedhack, Mono, DirectX 等)
          Write-Host "Collecting DLL plugins..."
          Get-ChildItem -Path "." -Filter "*.dll" -Recurse | ForEach-Object {
              if ($_.FullName -notmatch "obj|lib|backup|framework") {
                  copy $_.FullName build_output/
              }
          }

          # C. 验证结果
          ls build_output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pure-Cheat-Engine-Build
          path: build_output/
